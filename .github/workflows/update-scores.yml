name: Update Fantasy Scores

on:
  # Cron moved to CircleCI to save GHA minutes. Keep workflow_dispatch for manual runs.
  workflow_dispatch:
    inputs:
      backend:
        description: 'Backend to use (cricapi or espn)'
        required: false
        default: ''

env:
  # Change this value to switch backends: "cricapi" or "espn"
  BACKEND: espn

concurrency:
  group: score-update
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5 hours max
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch scores and update
        run: |
          SELECTED="${{ github.event.inputs.backend || env.BACKEND }}"
          echo "Using backend: $SELECTED"
          if [ "$SELECTED" = "espn" ]; then
            node scripts/update-scores-espn.js
          else
            node scripts/update-scores.js
          fi
        env:
          API_KEY_1: ${{ secrets.API_KEY_1 }}
          API_KEY_2: ${{ secrets.API_KEY_2 }}
          API_KEY_3: ${{ secrets.API_KEY_3 }}
          API_KEY_4: ${{ secrets.API_KEY_4 }}
          API_KEY_5: ${{ secrets.API_KEY_5 }}
          API_KEY_6: ${{ secrets.API_KEY_6 }}

      # Deploy directly — pushes by github-actions[bot] don't trigger other workflows
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
