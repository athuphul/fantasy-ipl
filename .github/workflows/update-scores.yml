name: Update Fantasy Scores

on:
  schedule:
    # Targeted cron using known IPL 2026 schedule. Budget: 1680 min / 1950 limit.
    # Evening matches (19:30 IST = 14:00 UTC) — all 58 match days, every 10 min
    - cron: '*/10 14-17 28-31 3 *'          # Mar 28-31
    - cron: '*/10 14-17 * 4 *'              # All April
    - cron: '*/10 14-17 1-24 5 *'           # May 1-24
    # Afternoon double headers (15:30 IST = 10:00 UTC) — 12 DH days only
    - cron: '*/10 10-13 4,5,11,12,18,19,25,26 4 *'  # April DH days
    - cron: '*/10 10-13 3,10,17,24 5 *'              # May DH days
  workflow_dispatch:
    inputs:
      backend:
        description: 'Backend to use (cricapi or espn)'
        required: false
        default: ''

env:
  # Change this value to switch backends: "cricapi" or "espn"
  BACKEND: espn

concurrency:
  group: score-update
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5 hours max
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch scores and update
        run: |
          SELECTED="${{ github.event.inputs.backend || env.BACKEND }}"
          echo "Using backend: $SELECTED"
          if [ "$SELECTED" = "espn" ]; then
            node scripts/update-scores-espn.js
          else
            node scripts/update-scores.js
          fi
        env:
          API_KEY_1: ${{ secrets.API_KEY_1 }}
          API_KEY_2: ${{ secrets.API_KEY_2 }}
          API_KEY_3: ${{ secrets.API_KEY_3 }}
          API_KEY_4: ${{ secrets.API_KEY_4 }}
          API_KEY_5: ${{ secrets.API_KEY_5 }}
          API_KEY_6: ${{ secrets.API_KEY_6 }}

      # Deploy directly — pushes by github-actions[bot] don't trigger other workflows
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
