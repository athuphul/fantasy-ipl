name: Update Fantasy Scores

on:
  schedule:
    # Every 10 min during IPL match hours (10:00-17:59 UTC = 15:30-23:29 IST)
    # Covers both afternoon (15:30 IST) and evening (19:30 IST) matches.
    # ~48 runs/day × 1 min each ≈ 1440 min/month, well under 2000 free tier.
    # The script exits instantly if no match is in the current window.
    - cron: '*/10 10-17 * 3-5 *'
  workflow_dispatch:
    inputs:
      backend:
        description: 'Backend to use (cricapi or espn)'
        required: false
        default: ''

env:
  # Change this value to switch backends: "cricapi" or "espn"
  BACKEND: espn

concurrency:
  group: score-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5 hours max
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch scores and poll until match ends
        run: |
          SELECTED="${{ github.event.inputs.backend || env.BACKEND }}"
          echo "Using backend: $SELECTED"
          if [ "$SELECTED" = "espn" ]; then
            node scripts/update-scores-espn.js
          else
            node scripts/update-scores.js
          fi
        env:
          API_KEY_1: ${{ secrets.API_KEY_1 }}
          API_KEY_2: ${{ secrets.API_KEY_2 }}
          API_KEY_3: ${{ secrets.API_KEY_3 }}
          API_KEY_4: ${{ secrets.API_KEY_4 }}
          API_KEY_5: ${{ secrets.API_KEY_5 }}
          API_KEY_6: ${{ secrets.API_KEY_6 }}
