version: 2.1

jobs:
  update-scores:
    docker:
      - image: cimg/node:20.0
    resource_class: small
    steps:
      - checkout
      - run:
          name: Configure Git
          command: |
            git config user.name "circleci-bot"
            git config user.email "circleci-bot@users.noreply.github.com"
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/athuphul/fantasy-ipl.git
      - run:
          name: Fetch and update scores
          command: node scripts/update-scores-espn.js
          no_output_timeout: 5m

workflows:
  # This workflow runs on scheduled pipelines (configured in CircleCI UI)
  # and can also be triggered manually from the dashboard.
  update:
    jobs:
      - update-scores
